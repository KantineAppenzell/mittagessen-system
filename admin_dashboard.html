<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 1000px;
  margin: auto;
}

.topbar {
  display: flex;
  justify-content: space-between;
}

button {
  padding: 8px;
  margin: 5px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: center;
}

th {
  background: #14968F;
  color: white;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
<button onclick="logout()">Logout</button>
</div>

<h2>Wochenübersicht</h2>

<h3>📊 Menü-Auswertung</h3>
<table id="summary"></table>

<h3>👥 Detailansicht</h3>
<div id="details"></div>

</div>

<script src="supabase.js"></script>

<script>

// LOGIN CHECK
if (localStorage.getItem("admin_logged") !== "true") {
  window.location.href = "admin.html";
}

// WOCHE (MO-FR)
function getWeek() {
  let days = [];
  let today = new Date();

  let monday = new Date(today);
  monday.setDate(today.getDate() - today.getDay() + 1);

  for (let i = 0; i < 5; i++) {
    let d = new Date(monday);
    d.setDate(monday.getDate() + i);

    days.push({
      date: d.toISOString().split("T")[0],
      label: d.toLocaleDateString("de-CH", {
        weekday: "long",
        day: "2-digit",
        month: "2-digit"
      })
    });
  }

  return days;
}

async function load() {

  const days = getWeek();

  let summaryHTML = `
    <tr>
      <th>Tag</th>
      <th>Menü 1</th>
      <th>Menü 2</th>
    </tr>
  `;

  let detailHTML = "";

  for (let day of days) {

    const orders = await window.supabaseClient
      .from("orders")
      .select("*")
      .eq("order_date", day.date);

    let menu1 = 0;
    let menu2 = 0;

    let persons = [];

    for (let o of orders.data) {

      if (o.selected_menu === "Menu 1") menu1++;
      if (o.selected_menu === "Menu 2") menu2++;

      const profile = await window.supabaseClient
        .from("profiles")
        .select("full_name")
        .eq("id", o.user_id)
        .single();

      if (profile.data) {
        persons.push(
          profile.data.full_name + " (" + o.selected_menu + ")"
        );
      }
    }

    // SUMMARY TABELLE
    summaryHTML += `
      <tr>
        <td>${day.label}</td>
        <td>${menu1}</td>
        <td>${menu2}</td>
      </tr>
    `;

    // DETAIL TABELLE
    detailHTML += `
      <h4>${day.label}</h4>
      ${persons.length === 0 ? "Keine Bestellungen" : persons.join("<br>")}
      <hr>
    `;
  }

  document.getElementById("summary").innerHTML = summaryHTML;
  document.getElementById("details").innerHTML = detailHTML;
}

function logout() {
  localStorage.removeItem("admin_logged");
  window.location.href = "admin.html";
}

load();

</script>

</body>
</html>
