<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

button {
  padding: 10px;
  margin: 5px;
  background: #14968F;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="card">
<h2>Export</h2>
<button onclick="exportWeek()">PDF Wochenübersicht</button>
<button onclick="exportStats()">Analyse PDF</button>
</div>

<div class="card">
<h2>Übersicht (2 Wochen)</h2>

<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div id="detailContainer"></div>

</div>

<script src="supabase.js"></script>

<script>

// 🔥 DATUM FIX (KEIN UTC BUG)
function formatDateLocal(date) {
  const d = new Date(date);
  const year = d.getFullYear();
  const month = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${year}-${month}-${day}`;
}

// 🔥 Arbeitstage
function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const day = current.getDay();
    if (day !== 0 && day !== 6) {
      days.push(new Date(current));
    }
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// 🔥 HAUPTFUNKTION
async function loadAdminData() {

  const days = getNextWorkdays(10);

  const { data: orders, error } = await supabase
    .from("orders")
    .select("*");

  console.log("ORDERS:", orders);

  if (error) {
    alert("Fehler beim Laden");
    console.log(error);
    return;
  }

  const tbody = document.querySelector("#summaryTable tbody");
  const detail = document.getElementById("detailContainer");

  tbody.innerHTML = "";
  detail.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);

    // 🔥 DEBUG
    console.log("Check date:", dateStr);

    const dayOrders = orders.filter(o => o.order_date === dateStr);

    console.log("Matches:", dayOrders);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td>${m1}</td>
        <td>${m2}</td>
      </tr>
    `;

    let list = "";

    dayOrders.forEach(o => {
      list += `<li>${o.user_id} → ${o.selected_menu}</li>`;
    });

    detail.innerHTML += `
      <div class="card">
        <h3>${getDayName(day)} - ${dateStr}</h3>
        <ul>${list || "<li>Keine Bestellungen</li>"}</ul>
      </div>
    `;
  });
}

// 🔥 EXPORT FIX
async function exportWeek() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const days = getNextWorkdays(10);

  const { data: orders } = await supabase
    .from("orders")
    .select("*");

  let y = 10;

  doc.text("Wochenübersicht", 10, y);

  days.forEach(day => {

    const dateStr = formatDateLocal(day);

    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    y += 8;
    doc.text(`${dateStr} | M1: ${m1} | M2: ${m2}`, 10, y);
  });

  doc.save("wochenbericht.pdf");
}

// 🔥 ANALYSE
async function exportStats() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data } = await supabase
    .from("orders")
    .select("*");

  const m1 = data.filter(x => x.selected_menu === "Menu 1").length;
  const m2 = data.filter(x => x.selected_menu === "Menu 2").length;

  doc.text("Analyse", 10, 10);
  doc.text(`Menu 1: ${m1}`, 10, 20);
  doc.text(`Menu 2: ${m2}`, 10, 30);

  doc.save("analyse.pdf");
}

// 🚀 START
loadAdminData();

</script>

</body>
</html>
