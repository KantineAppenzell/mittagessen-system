<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.topbar {
  position: absolute;
  top: 10px;
  left: 10px;
}

.topbar button {
  background: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
  cursor: pointer;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

button {
  padding: 10px;
  margin: 5px;
  background: #14968F;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="card">
<h2>Export</h2>
<button onclick="exportWeek()">PDF Wochenübersicht</button>
<button onclick="exportStats()">Analyse PDF</button>
</div>

<div class="card">
<h2>Übersicht (2 Wochen)</h2>

<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<div id="detailContainer"></div>

</div>

<script>

// ---------- HELPERS ----------
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// ---------- LOAD ----------
async function loadAdminData() {

  try {

    if (!window.supabaseClient) {
      alert("Supabase nicht geladen!");
      return;
    }

    const orderRes = await window.supabaseClient
      .from("orders")
      .select("*");

    const profileRes = await window.supabaseClient
      .from("profiles")
      .select("*");

    console.log("ORDERS:", orderRes);
    console.log("PROFILES:", profileRes);

    if (orderRes.error || profileRes.error) {
      alert("Fehler beim Laden");
      return;
    }

    const orders = orderRes.data || [];
    const profiles = profileRes.data || [];

    const days = getNextWorkdays(10);

    const tbody = document.querySelector("#summaryTable tbody");
    const detail = document.getElementById("detailContainer");

    tbody.innerHTML = "";
    detail.innerHTML = "";

    days.forEach(day => {

      const dateStr = formatDateLocal(day);

      const dayOrders = orders.filter(o => o.order_date === dateStr);

      const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
      const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

      tbody.innerHTML += `
        <tr>
          <td>${getDayName(day)}</td>
          <td>${dateStr}</td>
          <td>${m1}</td>
          <td>${m2}</td>
        </tr>
      `;

      let list = "";

      dayOrders.forEach(o => {
        const user = profiles.find(p => p.id === o.user_id);
        const name = user ? user.full_name : "Unbekannt";

        list += `<li>${name} → ${o.selected_menu}</li>`;
      });

      detail.innerHTML += `
        <div class="card">
          <h3>${getDayName(day)} - ${dateStr}</h3>
          <ul>${list || "<li>Keine Bestellungen</li>"}</ul>
        </div>
      `;
    });

  } catch (err) {
    console.log("CRASH:", err);
    alert("Admin Fehler – Console prüfen");
  }
}

// ---------- EXPORT WEEK ----------
async function exportWeek() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data: orders } = await window.supabaseClient
    .from("orders")
    .select("*");

  const days = getNextWorkdays(10);

  let y = 10;
  doc.text("Wochenübersicht", 10, y);

  days.forEach(day => {

    const dateStr = formatDateLocal(day);

    const dayOrders = (orders || []).filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    y += 8;
    doc.text(`${dateStr} | M1: ${m1} | M2: ${m2}`, 10, y);
  });

  doc.save("wochenbericht.pdf");
}

// ---------- EXPORT STATS ----------
async function exportStats() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data } = await window.supabaseClient
    .from("orders")
    .select("*");

  const m1 = (data || []).filter(x => x.selected_menu === "Menu 1").length;
  const m2 = (data || []).filter(x => x.selected_menu === "Menu 2").length;

  doc.text("Analyse", 10, 10);
  doc.text(`Menu 1: ${m1}`, 10, 20);
  doc.text(`Menu 2: ${m2}`, 10, 30);

  doc.save("analyse.pdf");
}

// ---------- START ----------
window.onload = loadAdminData;

</script>

</body>
</html>
