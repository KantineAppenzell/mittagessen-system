<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

button {
  background: #14968F;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="card">
<h2>Export</h2>
<button onclick="exportWeek()">PDF Wochenübersicht</button>
</div>

<div class="card">
<h2>2 Wochen Übersicht</h2>

<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>

// ---------- HELPERS ----------
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// ---------- DASHBOARD LADEN ----------
async function loadAdminData() {

  const { data: orders } = await supabaseClient
    .from("orders")
    .select("*");

  const days = getNextWorkdays(10);

  const tbody = document.querySelector("#summaryTable tbody");
  tbody.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);

    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td>${m1}</td>
        <td>${m2}</td>
      </tr>
    `;
  });
}

// ---------- PDF EXPORT ----------
async function exportWeek() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data: orders } = await supabaseClient
    .from("orders")
    .select("*");

  const { data: profiles } = await supabaseClient
    .from("profiles")
    .select("*");

  const days = getNextWorkdays(10);

  let y = 10;

  doc.text("Wochenübersicht", 10, y);

  // 🔥 Übersicht
  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    y += 8;
    doc.text(`${getDayName(day)} ${dateStr} | M1: ${m1} | M2: ${m2}`, 10, y);
  });

  y += 10;
  doc.text("Details", 10, y);

  // 🔥 Details pro Tag
  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    y += 8;
    doc.text(`${getDayName(day)} ${dateStr}`, 10, y);

    if(dayOrders.length === 0){
      y += 5;
      doc.text("Keine Bestellungen", 10, y);
      return;
    }

    dayOrders.forEach(o => {

      const user = profiles.find(p => p.id === o.user_id);
      const name = user ? user.full_name : "Unbekannt";

      y += 5;
      doc.text(`- ${name} → ${o.selected_menu}`, 10, y);
    });

  });

  doc.save("wochenreport.pdf");
}

// ---------- START ----------
loadAdminData();

</script>

</body>
</html>
