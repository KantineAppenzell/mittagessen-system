<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.topbar {
  position: absolute;
  top: 15px;
  left: 15px;
}

.topbar button {
  background: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

h1 {
  text-align: center;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #14968F;
  color: white;
}

.day-box {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

<h1>Admin Übersicht</h1>

<div class="card">
<h2>Wochenübersicht</h2>
<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div id="detailContainer"></div>

</div>

<script src="supabase.js"></script>

<script>

// 👉 Montag berechnen
function getMonday(d) {
  d = new Date(d);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  return new Date(d.setDate(diff));
}

function formatDate(date) {
  return date.toISOString().split("T")[0];
}

function getDayName(date) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][date.getDay()];
}

// 🔥 HAUPTFUNKTION
async function loadAdminData() {

  const monday = getMonday(new Date());

  const days = [];
  for (let i = 0; i < 5; i++) {
    const d = new Date(monday);
    d.setDate(d.getDate() + i);
    days.push(d);
  }

  // 🔥 JOIN QUERY (funktioniert jetzt wegen FK!)
  const { data: orders, error } = await window.supabaseClient
    .from("orders")
    .select(`
      order_date,
      selected_menu,
      profiles (
        full_name
      )
    `);

  console.log("ORDERS:", orders, error);

  if (error) {
    alert("Fehler beim Laden der Daten");
    console.log(error);
    return;
  }

  const tbody = document.querySelector("#summaryTable tbody");
  const detailContainer = document.getElementById("detailContainer");

  tbody.innerHTML = "";
  detailContainer.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDate(day);

    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const menu1Count = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const menu2Count = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    // Übersicht Tabelle
    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td>${menu1Count}</td>
        <td>${menu2Count}</td>
      </tr>
    `;

    // Detail Liste
    let namesHTML = "";

    dayOrders.forEach(o => {

      const name = o.profiles?.full_name || "Unbekannt";

      namesHTML += `<li>${name} → ${o.selected_menu}</li>`;
    });

    detailContainer.innerHTML += `
      <div class="card day-box">
        <h3>${getDayName(day)} - ${dateStr}</h3>
        <ul>${namesHTML || "<li>Keine Bestellungen</li>"}</ul>
      </div>
    `;

  });

}

// 🚀 Start
loadAdminData();

</script>

</body>
</html>
