<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #14968F;
  color: white;
  min-height: 100vh;
}

.topbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 100;
}

.topbar button {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1.5px solid rgba(255,255,255,0.5);
  color: white;
  padding: 8px 16px 8px 12px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}

.topbar button:hover {
  background: rgba(255,255,255,0.35);
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 70px 15px 30px;
}

h1 { margin-top: 0; font-size: clamp(1.4rem, 4vw, 2rem); }
h2 { font-size: clamp(1.1rem, 3vw, 1.5rem); margin-top: 0; }

.card {
  background: white;
  color: black;
  padding: 18px;
  border-radius: 12px;
  margin-bottom: 18px;
}

/* ---- Upload ---- */
.upload-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.upload-row input[type="file"] {
  flex: 1;
  min-width: 0;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

.btn {
  background: #14968F;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}

.btn:hover { background: #0f7a74; }

.btn-red {
  background: #c0392b;
}

.btn-red:hover { background: #a93226; }

/* ---- PDF List ---- */
.file-item {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.file-item:last-child { border-bottom: none; }

.file-url {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 13px;
  color: #555;
}

/* ---- Table ---- */
.table-wrapper { overflow-x: auto; }

table {
  width: 100%;
  min-width: 400px;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
  padding: 10px 12px;
  text-align: center;
}

td {
  padding: 10px 12px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

/* Mobile table → cards */
@media (max-width: 500px) {
  .table-wrapper { overflow-x: unset; }
  table, tbody { display: block; min-width: unset; }
  thead { display: none; }

  tr {
    display: block;
    background: #f8f8f8;
    border-radius: 10px;
    margin-bottom: 10px;
    padding: 10px 12px;
    border: 1px solid #ddd;
  }

  td {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border: none;
    border-bottom: 1px solid #eee;
    text-align: right;
  }

  td:last-child { border-bottom: none; }

  td::before {
    content: attr(data-label);
    font-weight: bold;
    color: #555;
    text-align: left;
    flex: 1;
    margin-right: 10px;
  }
}

@media (max-width: 480px) {
  .upload-row { flex-direction: column; }
  .upload-row input[type="file"], .btn { width: 100%; }
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

  <h1>Admin Dashboard</h1>

  <div class="card">
    <h2>Menü PDF Upload</h2>
    <div class="upload-row">
      <input type="file" id="fileInput" accept=".pdf">
      <button class="btn" onclick="uploadPDF()">⬆ Upload</button>
    </div>
  </div>

  <div class="card">
    <h2>PDF Verwaltung</h2>
    <div id="pdfList">Lade...</div>
  </div>

  <div class="card">
    <h2>Export</h2>
    <button class="btn" onclick="exportWeek()">📄 PDF Export</button>
  </div>

  <div class="card table-wrapper">
    <h2>2 Wochen Übersicht</h2>
    <table id="summaryTable">
      <thead>
        <tr>
          <th>Tag</th>
          <th>Datum</th>
          <th>Menü 1</th>
          <th>Menü 2</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script>
function cleanText(text) {
  if (!text) return "";
  try { return decodeURIComponent(escape(text)); }
  catch { return text; }
}

/*
  Wichtig:
  Dieses Format bleibt intern für Supabase:
  YYYY-MM-DD, z. B. 2026-05-04
*/
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/*
  Dieses Format ist nur für die Anzeige:
  TT.MM.JJJJ, z. B. 04.05.2026

  Es wird bewusst nicht mit new Date(dateStr) umgerechnet,
  damit keine Zeitzonenverschiebungen entstehen.
*/
function formatDateDisplay(dateStr) {
  if (!dateStr || !dateStr.includes("-")) return dateStr || "";
  const [year, month, day] = dateStr.split("-");
  return `${day}.${month}.${year}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();

    if (d !== 0 && d !== 6) {
      days.push(new Date(current));
    }

    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

async function uploadPDF() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Bitte Datei wählen");
    return;
  }

  const fileName = Date.now() + "_" + file.name;

  const { error } = await supabaseClient
    .storage
    .from("menus")
    .upload(fileName, file);

  if (error) {
    alert(error.message);
    return;
  }

  const { data } = supabaseClient
    .storage
    .from("menus")
    .getPublicUrl(fileName);

  await supabaseClient
    .from("menu_files")
    .insert({ file_url: data.publicUrl });

  alert("Upload erfolgreich!");
  loadPDFList();
}

async function loadPDFList() {
  const { data, error } = await supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending: false });

  const container = document.getElementById("pdfList");
  container.innerHTML = "";

  if (error) {
    console.error("Fehler beim Laden der PDFs:", error);
    container.innerHTML = "<p style='color:#c0392b;margin:0'>Fehler beim Laden der PDFs.</p>";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "<p style='color:#888;margin:0'>Keine PDFs vorhanden</p>";
    return;
  }

  data.forEach(pdf => {
    const name = pdf.file_url.split("/").pop();

    container.innerHTML += `
      <div class="file-item">
        <span class="file-url" title="${pdf.file_url}">${name}</span>
        <a class="btn" href="${pdf.file_url}" target="_blank">🔍 Ansehen</a>
        <button class="btn btn-red" onclick="deletePDF('${pdf.file_url}')">🗑 Löschen</button>
      </div>
    `;
  });
}

async function deletePDF(fileUrl) {
  if (!confirm("Wirklich löschen?")) {
    return;
  }

  const path = fileUrl.split("/menus/")[1];

  await supabaseClient
    .storage
    .from("menus")
    .remove([path]);

  await supabaseClient
    .from("menu_files")
    .delete()
    .eq("file_url", fileUrl);

  alert("Gelöscht!");
  loadPDFList();
}

async function loadAdminData() {
  const { data: orders, error } = await supabaseClient
    .from("orders")
    .select("*");

  if (error) {
    console.error("Fehler beim Laden der Bestellungen:", error);
    alert("Fehler beim Laden der Bestellungen: " + error.message);
    return;
  }

  const safeOrders = orders || [];
  const days = getNextWorkdays(10);
  const tbody = document.querySelector("#summaryTable tbody");
  tbody.innerHTML = "";

  days.forEach(day => {
    const dateStr = formatDateLocal(day);
    const dayOrders = safeOrders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders
      .filter(o => o.selected_menu === "Menu 1")
      .reduce((sum, o) => sum + Number(o.quantity || 1), 0);

    const m2 = dayOrders
      .filter(o => o.selected_menu === "Menu 2")
      .reduce((sum, o) => sum + Number(o.quantity || 1), 0);

    tbody.innerHTML += `
      <tr>
        <td data-label="Tag">${getDayName(day)}</td>
        <td data-label="Datum">${formatDateDisplay(dateStr)}</td>
        <td data-label="Menü 1">${m1}</td>
        <td data-label="Menü 2">${m2}</td>
      </tr>
    `;
  });
}

function drawWrappedText(doc, text, x, y, maxWidth, lineHeight) {
  const lines = doc.splitTextToSize(text, maxWidth);
  lines.forEach(line => {
    doc.text(line, x, y);
    y += lineHeight;
  });
  return y;
}

function drawDetailColumn(doc, title, dayOrders, profiles, x, y, columnWidth) {
  doc.setFont(undefined, "bold");
  doc.text(title, x, y);
  doc.setFont(undefined, "normal");

  y += 6;

  if (!dayOrders || dayOrders.length === 0) {
    doc.text("Keine Bestellungen", x, y);
    return y + 6;
  }

  dayOrders.forEach(o => {
    const user = profiles.find(p => p.id === o.user_id);
    const name = cleanText(user ? user.full_name : "Unbekannt");
    const qty = Number(o.quantity || 1);
    const line = `- ${name} (${o.selected_menu} x${qty})`;

    const wrapped = doc.splitTextToSize(line, columnWidth);
    wrapped.forEach(part => {
      if (y > 285) {
        doc.addPage();
        y = 15;
      }

      doc.text(part, x, y);
      y += 5;
    });
  });

  return y;
}

async function exportWeek() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data: ordersData, error: ordersError } = await supabaseClient
    .from("orders")
    .select("*");

  if (ordersError) {
    console.error("Fehler beim Laden der Bestellungen:", ordersError);
    alert("Fehler beim Laden der Bestellungen: " + ordersError.message);
    return;
  }

  const { data: profilesData, error: profilesError } = await supabaseClient
    .from("profiles")
    .select("*");

  if (profilesError) {
    console.error("Fehler beim Laden der Profile:", profilesError);
    alert("Fehler beim Laden der Profile: " + profilesError.message);
    return;
  }

  const orders = ordersData || [];
  const profiles = profilesData || [];

  const days = getNextWorkdays(10);
  const detailDays = getNextWorkdays(2);

  let y = 12;

  doc.setFontSize(16);
  doc.text("Übersicht 2 Wochen", 10, y);

  y += 10;
  doc.setFontSize(11);

  days.forEach(day => {
    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders
      .filter(o => o.selected_menu === "Menu 1")
      .reduce((sum, o) => sum + Number(o.quantity || 1), 0);

    const m2 = dayOrders
      .filter(o => o.selected_menu === "Menu 2")
      .reduce((sum, o) => sum + Number(o.quantity || 1), 0);

    doc.text(`${getDayName(day)} ${formatDateDisplay(dateStr)} | Menü 1: ${m1} | Menü 2: ${m2}`, 10, y);
    y += 6;
  });

  y += 8;

  doc.setFontSize(14);
  doc.text("Details nächste 2 Tage", 10, y);
  y += 8;

  doc.setFontSize(10);

  /*
    Detailansicht der zwei Tage in zwei Spalten nebeneinander.
    Linke Spalte = erster Arbeitstag
    Rechte Spalte = zweiter Arbeitstag
  */
  const leftX = 10;
  const rightX = 108;
  const columnWidth = 88;
  const startY = y;

  const firstDay = detailDays[0];
  const secondDay = detailDays[1];

  if (firstDay) {
    const dateStr = formatDateLocal(firstDay);
    const dayOrders = orders.filter(o => o.order_date === dateStr);
    drawDetailColumn(
      doc,
      `${getDayName(firstDay)} ${formatDateDisplay(dateStr)}`,
      dayOrders,
      profiles,
      leftX,
      startY,
      columnWidth
    );
  }

  if (secondDay) {
    const dateStr = formatDateLocal(secondDay);
    const dayOrders = orders.filter(o => o.order_date === dateStr);
    drawDetailColumn(
      doc,
      `${getDayName(secondDay)} ${formatDateDisplay(dateStr)}`,
      dayOrders,
      profiles,
      rightX,
      startY,
      columnWidth
    );
  }

  doc.save("export.pdf");
}

loadAdminData();
loadPDFList();
</script>

</body>
</html>
