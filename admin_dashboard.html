<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { background:#14968F; font-family:Arial; color:white; }
.container { max-width:1000px; margin:auto; padding:40px; }
.card { background:white; color:black; padding:20px; border-radius:12px; margin-bottom:20px; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<div class="container">

<h1>Admin</h1>

<div class="card">
<h2>PDF Upload Menü</h2>
<input type="file" id="file">
<button onclick="uploadPDF()">Upload</button>
</div>

<div class="card">
<h2>Export nächste Woche</h2>
<button onclick="exportWeek()">PDF Export</button>
</div>

<div class="card">
<h2>Analyse (Monate)</h2>
<button onclick="exportStats()">Analyse PDF</button>
</div>

</div>

<script src="supabase.js"></script>

<script>

// 🔥 Upload
async function uploadPDF() {

  const file = document.getElementById("file").files[0];

  const { data, error } = await supabase.storage
    .from("menus")
    .upload("menu.pdf", file, { upsert:true });

  const url = `https://YOUR_PROJECT.supabase.co/storage/v1/object/public/menus/menu.pdf`;

  await supabase.from("menu_files").insert({ file_url:url });

  alert("Uploaded!");
}

// 🔥 Export Woche
async function exportWeek() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data } = await supabase.from("orders").select("*");

  let y = 10;

  doc.text("Wochenübersicht", 10, y);
  y += 10;

  data.forEach(o => {
    doc.text(`${o.order_date} - ${o.selected_menu}`, 10, y);
    y += 8;
  });

  doc.save("wochenbericht.pdf");
}

// 🔥 Analyse PDF
async function exportStats() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data } = await supabase.from("orders").select("*");

  const total = data.length;
  const menu1 = data.filter(x => x.selected_menu==="Menu 1").length;
  const menu2 = data.filter(x => x.selected_menu==="Menu 2").length;

  doc.text("Analyse", 10, 10);
  doc.text(`Total: ${total}`, 10, 20);
  doc.text(`Menu1: ${menu1}`, 10, 30);
  doc.text(`Menu2: ${menu2}`, 10, 40);

  doc.save("analyse.pdf");
}

</script>

</body>
</html>
