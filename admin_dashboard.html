<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

button {
  background: #14968F;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="card">
<h2>Menü PDF Upload</h2>
<input type="file" id="fileInput">
<button onclick="uploadPDF()">Upload</button>
</div>

<div class="card">
<h2>PDF Verwaltung</h2>
<div id="pdfList">Lade...</div>
</div>

<div class="card">
<h2>Export</h2>
<button onclick="exportWeek()">PDF Tagesliste (Heute + Morgen)</button>
</div>

<div class="card">
<h2>2 Wochen Übersicht</h2>

<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>

// ---------- FIX ENCODING ----------
function cleanText(text) {
  if (!text) return "";
  try {
    return decodeURIComponent(escape(text));
  } catch {
    return text;
  }
}

// ---------- HELPERS ----------
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// ---------- PDF EXPORT (NEU) ----------
async function exportWeek() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data: orders } = await supabaseClient.from("orders").select("*");
  const { data: profiles } = await supabaseClient.from("profiles").select("*");

  const today = new Date();
  const tomorrow = new Date();
  tomorrow.setDate(today.getDate() + 1);

  const days = [today, tomorrow];

  let y = 15;

  doc.setFontSize(16);
  doc.text("Bestellungen", 10, y);

  doc.setFontSize(10);

  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    y += 10;
    doc.setFontSize(12);
    doc.text(`${getDayName(day)} ${dateStr}`, 10, y);

    y += 5;
    doc.setFontSize(10);

    let leftY = y;
    let rightY = y;

    dayOrders.forEach((o, index) => {

      const user = profiles.find(p => p.id === o.user_id);
      const name = cleanText(user ? user.full_name : "Unbekannt");

      const text = `${name} (${o.selected_menu})`;

      // 🔥 2 SPALTEN LOGIK
      if (index % 2 === 0) {
        doc.text(text, 10, leftY);
        leftY += 6;
      } else {
        doc.text(text, 110, rightY);
        rightY += 6;
      }

    });

    y = Math.max(leftY, rightY) + 5;

  });

  doc.save("tagesliste.pdf");
}

// ---------- PDF UPLOAD ----------
async function uploadPDF(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Bitte Datei wählen");

  const fileName = Date.now() + "_" + file.name;

  await supabaseClient.storage.from("menus").upload(fileName, file);

  const { data } = supabaseClient.storage.from("menus").getPublicUrl(fileName);

  await supabaseClient.from("menu_files").insert({
    file_url: data.publicUrl
  });

  loadPDFList();
}

// ---------- PDF LISTE ----------
async function loadPDFList(){
  const { data } = await supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending:false });

  const container = document.getElementById("pdfList");
  container.innerHTML = "";

  data.forEach(pdf => {
    container.innerHTML += `
      <div>
        ${pdf.file_url}
        <br>
        <button onclick="deletePDF('${pdf.file_url}')">Löschen</button>
      </div>
    `;
  });
}

async function deletePDF(fileUrl){
  const path = fileUrl.split("/menus/")[1];
  await supabaseClient.storage.from("menus").remove([path]);
  await supabaseClient.from("menu_files").delete().eq("file_url", fileUrl);
  loadPDFList();
}

// ---------- DASHBOARD ----------
async function loadAdminData() {

  const { data: orders } = await supabaseClient.from("orders").select("*");

  const days = getNextWorkdays(10);
  const tbody = document.querySelector("#summaryTable tbody");
  tbody.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td>${m1}</td>
        <td>${m2}</td>
      </tr>
    `;
  });
}

loadAdminData();
loadPDFList();

</script>

</body>
</html>
