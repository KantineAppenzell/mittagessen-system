<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.topbar {
  position: fixed;
  top: 10px;
  left: 10px;
}

.topbar button {
  background: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 70px 15px 20px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.table-wrapper {
  overflow-x: auto;
}

table {
  min-width: 600px;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

button {
  background: #14968F;
  color: white;
  border: none;
  padding: 10px;
}

.file-item {
  border-bottom: 1px solid #ddd;
  padding: 10px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

<h1>Admin Dashboard</h1>

<div class="card">
<h2>Menü PDF Upload</h2>
<input type="file" id="fileInput">
<button onclick="uploadPDF()">Upload</button>
</div>

<div class="card">
<h2>PDF Verwaltung</h2>
<div id="pdfList">Lade...</div>
</div>

<div class="card">
<h2>Export</h2>
<button onclick="exportWeek()">PDF Export</button>
</div>

<div class="card table-wrapper">
<h2>2 Wochen Übersicht</h2>
<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>

// ---------- CLEAN ----------
function cleanText(text) {
  if (!text) return "";
  try {
    return decodeURIComponent(escape(text));
  } catch {
    return text;
  }
}

// ---------- HELPERS ----------
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getNextTwoWorkdays() {
  return getNextWorkdays(2);
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// ---------- PDF UPLOAD ----------
async function uploadPDF(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Bitte Datei wählen");

  const fileName = Date.now() + "_" + file.name;

  const { error } = await supabaseClient.storage.from("menus").upload(fileName, file);
  if(error) return alert(error.message);

  const { data } = supabaseClient.storage.from("menus").getPublicUrl(fileName);

  await supabaseClient.from("menu_files").insert({ file_url: data.publicUrl });

  alert("Upload erfolgreich!");
  loadPDFList();
}

// ---------- PDF LISTE ----------
async function loadPDFList(){
  const { data } = await supabaseClient.from("menu_files").select("*").order("created_at", { ascending:false });

  const container = document.getElementById("pdfList");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = "Keine PDFs vorhanden";
    return;
  }

  data.forEach(pdf => {
    container.innerHTML += `
      <div class="file-item">
        ${pdf.file_url}
        <br>
        <button onclick="deletePDF('${pdf.file_url}')">Löschen</button>
      </div>
    `;
  });
}

// ---------- DELETE ----------
async function deletePDF(fileUrl){
  if(!confirm("Wirklich löschen?")) return;

  const path = fileUrl.split("/menus/")[1];

  await supabaseClient.storage.from("menus").remove([path]);

  await supabaseClient.from("menu_files").delete().eq("file_url", fileUrl);

  alert("Gelöscht!");
  loadPDFList();
}

// ---------- DASHBOARD ----------
async function loadAdminData() {
  const { data: orders } = await supabaseClient.from("orders").select("*");

  const days = getNextWorkdays(10);
  const tbody = document.querySelector("#summaryTable tbody");
  tbody.innerHTML = "";

  days.forEach(day => {
    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td>${m1}</td>
        <td>${m2}</td>
      </tr>
    `;
  });
}

// ---------- EXPORT ----------
async function exportWeek() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data: orders } = await supabaseClient.from("orders").select("*");
  const { data: profiles } = await supabaseClient.from("profiles").select("*");

  const days = getNextWorkdays(10);
  const detailDays = getNextTwoWorkdays();

  let y = 10;

  doc.text("Übersicht (2 Wochen)", 10, y);

  days.forEach(day => {
    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    y += 6;
    doc.text(`${getDayName(day)} ${dateStr} | M1: ${m1} | M2: ${m2}`, 10, y);
  });

  y += 10;
  doc.text("Details", 10, y);

  detailDays.forEach(day => {
    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    y += 6;
    doc.text(`${getDayName(day)} ${dateStr}`, 10, y);

    dayOrders.forEach(o => {
      const user = profiles.find(p => p.id === o.user_id);
      const name = cleanText(user ? user.full_name : "Unbekannt");

      y += 5;
      doc.text(`- ${name} (${o.selected_menu} x1)`, 10, y);
    });
  });

  doc.save("export.pdf");
}

// ---------- START ----------
loadAdminData();
loadPDFList();

</script>

</body>
</html>
