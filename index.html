<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mittagessen Bestellung</title>

<!-- QR CODE LIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 🔥 Card etwas breiter wegen QR */
.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 340px;
  text-align: center;
}

h1 { 
  color: #14968F; 
  margin-bottom: 15px;
}

a {
  display: block;
  margin: 10px 0;
  padding: 12px;
  background: #14968F;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* 🔥 QR Bereich */
.qr-box {
  margin-top: 20px;
  padding-top: 15px;
  border-top: 1px solid #ddd;
}

#qrcode {
  margin: 10px auto;
  width: 140px;
}
</style>
</head>

<body>

<div class="card">
<h1>Mittagessen Bestellung</h1>

<a href="login.html">Login</a>
<a href="admin.html">Admin</a>

<!-- 🔥 QR CODE -->
<div class="qr-box">
  <div><strong>Mit Handy öffnen</strong></div>
  <div id="qrcode"></div>
</div>

</div>

<script>
// 🔥 QR erzeugen mit aktueller URL
new QRCode(document.getElementById("qrcode"), {
  text: window.location.href,
  width: 140,
  height: 140
});
</script>

</body>
</html>
