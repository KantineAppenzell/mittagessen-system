<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
}

.topbar {
  position: fixed;
  top: 10px;
  left: 10px;
}

.topbar button {
  background: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: bold;
}

.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 100%;
  max-width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="wrapper">

<div class="card">
<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Passwort">

<button onclick="login()">Login</button>
</div>

</div>

<script>
async function login() {

  const res = await window.supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (res.error) {
    alert("Login falsch");
    return;
  }

  const profile = await window.supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", res.data.user.id)
    .single();

  if (!profile.data || profile.data.role !== "admin") {
    alert("Kein Admin!");
    return;
  }

  window.location.href = "admin_dashboard.html";
}
</script>

</body>
</html>
