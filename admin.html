<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Wochenmenü erfassen</h2>

<input id="date" type="date"><br><br>
<input id="menu1" placeholder="Menü 1"><br><br>
<input id="menu2" placeholder="Menü 2"><br><br>

<button onclick="saveMenu()">Speichern</button>

<h3 id="status"></h3>

<script src="supabase.js"></script>

<script>

async function saveMenu() {
  const date = document.getElementById("date").value;
  const menu1 = document.getElementById("menu1").value;
  const menu2 = document.getElementById("menu2").value;

  const { error } = await supabase.from("weekly_menu").insert({
    menu_date: date,
    menu_1: menu1,
    menu_2: menu2
  });

  document.getElementById("status").innerText =
    error ? error.message : "Gespeichert!";
}

</script>

</body>
</html>
