<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
</head>

<body>

<h2>Admin Login</h2>

<input id="user">
<input id="pw" type="password">

<button onclick="login()">Login</button>

<script>
function login() {
  if (user.value === "AlterszentrumGontenbad" && pw.value === "123456789") {
    localStorage.setItem("admin_logged", "true");
    window.location.href = "admin_dashboard.html";
  } else {
    alert("Falsch");
  }
}
</script>

</body>
</html>
