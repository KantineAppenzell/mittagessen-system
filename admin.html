<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.topbar {
  position: absolute;
  top: 15px;
  left: 15px;
}

.topbar button {
  background: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="card">
<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pw" type="password" placeholder="Passwort">

<button onclick="login()">Login</button>
</div>

<script>
function login() {
  if (user.value === "AlterszentrumGontenbad" && pw.value === "123456789") {
    localStorage.setItem("admin_logged", "true");
    window.location.href = "admin_dashboard.html";
  } else {
    alert("Falsche Daten");
  }
}
</script>

</body>
</html>
