<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.topbar {
  position: absolute;
  top: 15px;
  left: 15px;
}

.topbar button {
  background: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 340px;
  text-align: center;
}

h2 {
  color: #14968F;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
}

button.main {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.switch {
  margin-top: 10px;
  font-size: 14px;
  cursor: pointer;
  color: #14968F;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="card">

<h2 id="title">Login</h2>

<!-- REGISTRIERUNG -->
<div id="registerBox" style="display:none;">
  <input id="firstname" placeholder="Vorname">
  <input id="lastname" placeholder="Nachname">
  <input id="email_reg" placeholder="Email">
  <input id="password_reg" type="password" placeholder="Passwort">

  <button class="main" onclick="register()">Registrieren</button>

  <div class="switch" onclick="showLogin()">Schon registriert? Login</div>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Passwort">

  <button class="main" onclick="login()">Login</button>

  <div class="switch" onclick="showRegister()">Noch kein Account? Registrieren</div>
</div>

<div id="status"></div>

</div>

<script src="supabase.js"></script>

<script>

function showRegister() {
  loginBox.style.display = "none";
  registerBox.style.display = "block";
  title.innerText = "Registrieren";
}

function showLogin() {
  loginBox.style.display = "block";
  registerBox.style.display = "none";
  title.innerText = "Login";
}

// 🔐 REGISTRIEREN
async function register() {

  if (!firstname.value || !lastname.value) {
    status.innerText = "Bitte Name eingeben";
    return;
  }

  const { data, error } = await window.supabaseClient.auth.signUp({
    email: email_reg.value,
    password: password_reg.value
  });

  if (error) {
    status.innerText = error.message;
    return;
  }

  await window.supabaseClient.from("profiles").insert({
    id: data.user.id,
    first_name: firstname.value,
    last_name: lastname.value,
    full_name: firstname.value + " " + lastname.value
  });

  status.innerText = "Registriert! Jetzt einloggen.";
  showLogin();
}

// 🔐 LOGIN
async function login() {

  const { data, error } = await window.supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: password.value
  });

  if (error) {
    status.innerText = "User existiert nicht → bitte registrieren";
    return;
  }

  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
