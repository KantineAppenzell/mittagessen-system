<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #14968F;
  color: white;
  min-height: 100vh;
}

.topbar {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 100;
}

.topbar {
  display: flex;
  gap: 10px;
}

.topbar button {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1.5px solid rgba(255,255,255,0.5);
  color: white;
  padding: 8px 16px 8px 12px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}

.topbar button:hover {
  background: rgba(255,255,255,0.35);
}

.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 80px 16px 30px;
}

.card {
  background: white;
  color: #333;
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 6px 22px rgba(0,0,0,0.15);
  margin-bottom: 22px;
}

h2 {
  margin-top: 0;
  color: #14968F;
}

.info-text {
  margin: -4px 0 18px;
  padding: 12px 14px;
  background: #eaf7f6;
  border-left: 5px solid #14968F;
  border-radius: 8px;
  color: #333;
  line-height: 1.45;
}

.menu-pdfs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.pdf-entry {
  background: #f4f4f4;
  border-radius: 12px;
  padding: 10px;
}

.pdf-iframe-wrap {
  height: 380px;
  border-radius: 10px;
  overflow: hidden;
  background: #ddd;
}

.pdf-iframe-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.pdf-link-btn {
  display: block;
  text-align: center;
  margin-top: 10px;
  padding: 10px;
  background: #14968F;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}

th, td {
  border-bottom: 1px solid #ddd;
  padding: 10px;
  text-align: center;
}

th {
  background: #14968F;
  color: white;
}

input[type="checkbox"] {
  width: 22px;
  height: 22px;
  cursor: pointer;
}

.qty-control {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.qty-btn {
  width: 30px;
  height: 30px;
  border: none;
  background: #14968F;
  color: white;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
}

.qty-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.qty-value {
  min-width: 24px;
  display: inline-block;
  font-weight: bold;
}

.save-btn,
.overview-btn,
.delete-btn {
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-weight: bold;
}

.save-btn {
  background: #14968F;
}

.overview-btn,
.overview-btn {
  background: #14968F;
  display: inline-block;
  text-align: center;
  margin-bottom: 15px;
  padding: 10px 16px;
  border-radius: 8px;
  color: white;
  text-decoration: none;
  font-weight: bold;
}

.delete-btn {
  background: #d9534f;
}

.save-btn:disabled,
.delete-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

@media (max-width: 700px) {
  .container {
    padding-top: 70px;
  }

  .menu-pdfs {
    grid-template-columns: 1fr;
  }

  .pdf-iframe-wrap {
    height: 300px;
  }

  table {
    min-width: 0;
  }

  thead {
    display: none;
  }

  tr {
    display: block;
    margin-bottom: 16px;
    background: #f7f7f7;
    border-radius: 12px;
    padding: 10px;
  }

  td {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #ddd;
    text-align: right;
  }

  td::before {
    content: attr(data-label);
    font-weight: bold;
    color: #14968F;
    text-align: left;
  }

  td:last-child {
    border-bottom: none;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="window.location.href='index.html'">⬅ Zurück</button>
  <button onclick="window.location.href='overview.html'">📋 Übersicht</button>
</div>

<div class="container">

  <div class="card">
    <h2>Aktuelles Menü</h2>
    <p class="info-text">Bestellungen sind am Vortag bis 13:00 Uhr anzumelden. Wenn dies nicht möglich ist, bitte unter folgender Nummer Kontakt aufnehmen: 071 795 31 16.</p>
    <div id="menuContainer" class="menu-pdfs"></div>
  </div>

  <div class="card">
    <h2>Mittagessen bestellen</h2>
    <a class="overview-btn" href="overview.html">📋 Übersicht</a>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tag</th>
            <th>Datum</th>
            <th>Menü 1</th>
            <th>Menü 2</th>
            <th>Anzahl</th>
            <th>Speichern</th>
            <th>Abmelden</th>
          </tr>
        </thead>
        <tbody id="menuTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
const tempSelection = {};
const tempQty = {};

function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function formatDateDisplay(dateStr) {
  const [year, month, day] = dateStr.split("-");
  return `${day}.${month}.${year}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();

    if (d !== 0 && d !== 6) {
      days.push(new Date(current));
    }

    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"][d.getDay()];
}

function isOrderTooLate(orderDateStr) {
  const now = new Date();
  const orderDate = new Date(orderDateStr);
  const cutoff = new Date(orderDate);

  const day = orderDate.getDay();

  // Montag: spätestens Freitag 13:00 Uhr
  if (day === 1) {
    cutoff.setDate(orderDate.getDate() - 3);
  } else {
    // Alle anderen Tage: spätestens Vortag 13:00 Uhr
    cutoff.setDate(orderDate.getDate() - 1);
  }

  cutoff.setHours(13, 0, 0, 0);

  return now > cutoff;
}

async function loadMenuPDF() {
  const { data, error } = await supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending: false })
    .limit(2);

  const container = document.getElementById("menuContainer");
  container.innerHTML = "";

  if (error) {
    console.error("Fehler beim Laden der Menü-PDFs:", error);
    container.innerHTML = "Fehler beim Laden des Menüs.";
    return;
  }

  if (!data || data.length === 0) {
    container.innerHTML = "Kein Menü verfügbar";
    return;
  }

  data.forEach(pdf => {
    container.innerHTML += `
      <div class="pdf-entry">
        <div class="pdf-iframe-wrap">
          <iframe src="${pdf.file_url}"></iframe>
        </div>
        <a class="pdf-link-btn" href="${pdf.file_url}" target="_blank">📄 Menü PDF öffnen</a>
      </div>
    `;
  });
}

async function getCurrentUser() {
  const { data, error } = await supabaseClient.auth.getUser();

  if (error || !data.user) {
    console.error("Kein Benutzer angemeldet:", error);
    alert("Du bist nicht angemeldet.");
    window.location.href = "login.html";
    return null;
  }

  return data.user;
}

async function loadDashboard() {
  const user = await getCurrentUser();

  if (!user) {
    return;
  }

  const { data: orders, error: ordersError } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id);

  if (ordersError) {
    console.error("Fehler beim Laden der Bestellungen:", ordersError);
    alert("Fehler beim Laden der Bestellungen: " + ordersError.message);
    return;
  }

  const safeOrders = orders || [];
  const days = getNextWorkdays(10);
  const table = document.getElementById("menuTable");
  table.innerHTML = "";

  days.forEach(day => {
    const dateStr = formatDateLocal(day);
    const myOrder = safeOrders.find(o => o.order_date === dateStr);

    const selected = tempSelection[dateStr] || myOrder?.selected_menu;

    const m1Checked = selected === "Menu 1" ? "checked" : "";
    const m2Checked = selected === "Menu 2" ? "checked" : "";

    const tooLate = isOrderTooLate(dateStr);
    const disabled = tooLate ? "disabled" : "";
    const hasOrder = myOrder ? "" : "disabled";

    const currentQty = tempQty[dateStr] ?? Number(myOrder?.quantity || 1);

    table.innerHTML += `
      <tr>
        <td data-label="Tag">${getDayName(day)}</td>
        <td data-label="Datum">${formatDateDisplay(dateStr)}</td>

        <td data-label="Menü 1">
          <input 
            type="checkbox" 
            ${m1Checked} 
            ${disabled}
            onclick="handleLate('${dateStr}')"
            onchange="selectTemp('${dateStr}', 'Menu 1')">
        </td>

        <td data-label="Menü 2">
          <input 
            type="checkbox" 
            ${m2Checked} 
            ${disabled}
            onclick="handleLate('${dateStr}')"
            onchange="selectTemp('${dateStr}', 'Menu 2')">
        </td>

        <td data-label="Anzahl">
          <div class="qty-control">
            <button 
              class="qty-btn" 
              ${disabled} 
              onclick="changeQty('${dateStr}', -1)">−</button>

            <span class="qty-value" id="qty_${dateStr}">${currentQty}</span>

            <button 
              class="qty-btn" 
              ${disabled} 
              onclick="changeQty('${dateStr}', 1)">+</button>
          </div>
        </td>

        <td data-label="Speichern">
          <button 
            class="save-btn" 
            ${disabled}
            onclick="saveSelection('${dateStr}')">💾</button>
        </td>

        <td data-label="Abmelden">
          <button 
            class="delete-btn" 
            ${hasOrder} 
            ${disabled}
            onclick="cancel('${dateStr}')">✖</button>
        </td>
      </tr>
    `;
  });
}

function handleLate(date) {
  if (isOrderTooLate(date)) {
    alert("Zu spät für die Anmeldung!\nBitte melde dich unter: 0717953116");
  }
}

function selectTemp(date, menu) {
  tempSelection[date] = menu;

  if (!tempQty[date]) {
    const qtyEl = document.getElementById(`qty_${date}`);
    tempQty[date] = qtyEl ? Number(qtyEl.textContent) || 1 : 1;
  }

  loadDashboard();
}

function changeQty(date, delta) {
  const el = document.getElementById(`qty_${date}`);

  if (!el) {
    return;
  }

  const current = Number(el.textContent) || 1;
  const next = Math.max(1, current + delta);

  tempQty[date] = next;
  el.textContent = next;
}

async function saveSelection(date) {
  if (isOrderTooLate(date)) {
    alert("Zu spät für die Anmeldung!\nBitte melde dich unter: 0717953116");
    return;
  }

  const user = await getCurrentUser();

  if (!user) {
    return;
  }

  let menu = tempSelection[date];

  /*
    Wenn bereits eine Bestellung existiert und nur die Anzahl geändert wird,
    übernehmen wir das bestehende Menü aus Supabase.
  */
  if (!menu) {
    const { data: existingOrder, error: existingError } = await supabaseClient
      .from("orders")
      .select("selected_menu, quantity")
      .eq("user_id", user.id)
      .eq("order_date", date)
      .maybeSingle();

    if (existingError) {
      console.error("Fehler beim Prüfen der bestehenden Bestellung:", existingError);
      alert("Fehler beim Prüfen der bestehenden Bestellung: " + existingError.message);
      return;
    }

    if (existingOrder) {
      menu = existingOrder.selected_menu;
    }
  }

  if (!menu) {
    alert("Bitte zuerst Menü wählen");
    return;
  }

  const qtyEl = document.getElementById(`qty_${date}`);
  const qty = tempQty[date] || Number(qtyEl?.textContent) || 1;

  /*
    Wichtig:
    Damit upsert sauber aktualisiert statt zusätzliche Zeilen zu erstellen,
    muss in Supabase ein Unique Constraint auf user_id + order_date existieren:

    alter table public.orders
    add constraint unique_user_order_date unique (user_id, order_date);
  */
  const { data, error } = await supabaseClient
    .from("orders")
    .upsert(
      {
        user_id: user.id,
        order_date: date,
        selected_menu: menu,
        quantity: qty,
        status: "ordered"
      },
      {
        onConflict: "user_id,order_date"
      }
    )
    .select();

  if (error) {
    console.error("Fehler beim Speichern:", error);
    alert("Fehler beim Speichern: " + error.message);
    return;
  }

  console.log("Bestellung gespeichert:", data);

  delete tempSelection[date];
  delete tempQty[date];

  await loadDashboard();

  alert("Bestellung gespeichert!");
}

async function cancel(date) {
  if (isOrderTooLate(date)) {
    alert("Zu spät für die Abmeldung!");
    return;
  }

  const user = await getCurrentUser();

  if (!user) {
    return;
  }

  const { error } = await supabaseClient
    .from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  if (error) {
    console.error("Fehler beim Abmelden:", error);
    alert("Fehler beim Abmelden: " + error.message);
    return;
  }

  delete tempSelection[date];
  delete tempQty[date];

  await loadDashboard();

  alert("Bestellung wurde abgemeldet.");
}

window.onload = () => {
  loadDashboard();
  loadMenuPDF();
};
</script>

</body>
</html>
