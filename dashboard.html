<!DOCTYPE html>
<html>
<head>
  <title>Bestellung</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h2>Mittagessen wählen</h2>

<div id="menu">Lade Menü...</div><br>

<button onclick="order('Menu 1')">Menü 1</button>
<button onclick="order('Menu 2')">Menü 2</button>
<button onclick="cancel()">Abmelden</button>

<h3 id="status"></h3>

<script src="supabase.js"></script>

<script>

async function loadMenu() {
  const today = new Date().toISOString().split("T")[0];

  const { data } = await window.supabaseClient
    .from("weekly_menu")
    .select("*")
    .eq("menu_date", today)
    .single();

  if (data) {
    document.getElementById("menu").innerHTML =
      `<b>${data.menu_1}</b><br>${data.menu_2}`;
  } else {
    document.getElementById("menu").innerText = "Kein Menü gefunden";
  }
}

async function order(menu) {
  const now = new Date();
  const hour = now.getHours();

  if (hour >= 7) {
    document.getElementById("status").innerText =
      "Bestellung für heute geschlossen!";
    return;
  }

  const user = await window.supabaseClient.auth.getUser();

  await window.supabaseClient.from("orders").insert({
    user_id: user.data.user.id,
    order_date: new Date().toISOString().split("T")[0],
    selected_menu: menu,
    status: "ordered"
  });

  document.getElementById("status").innerText = "Bestellt!";
}

async function cancel() {
  const user = await window.supabaseClient.auth.getUser();

  await window.supabaseClient
    .from("orders")
    .update({ status: "cancelled" })
    .eq("user_id", user.data.user.id);

  document.getElementById("status").innerText = "Abgemeldet!";
}

loadMenu();

</script>

</body>
</html>
