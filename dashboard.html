<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { margin:0; font-family:Arial; background:#14968F; color:white; }
.container { max-width:900px; margin:auto; padding:40px; }
.card { background:white; color:black; padding:20px; border-radius:12px; margin-bottom:20px; }
button { background:#14968F; color:white; border:none; padding:8px; margin:5px; cursor:pointer; }
iframe { width:100%; height:400px; border:none; }
</style>
</head>

<body>

<div class="container">

<h1>Mittagessen Bestellung</h1>

<div class="card">
<h2>Menü ansehen</h2>
<iframe id="menuPDF"></iframe>
</div>

<div id="weekContainer"></div>

</div>

<script src="supabase.js"></script>

<script>

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();
  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }
  return days;
}

function formatDate(d) {
  return d.toISOString().split("T")[0];
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// 🔥 PDF laden
async function loadMenuPDF() {
  const { data } = await supabase
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(1);

  if (data.length > 0) {
    document.getElementById("menuPDF").src = data[0].file_url;
  }
}

// 🔥 BESTELLSCHLUSS
function isTooLate(dateStr) {
  const now = new Date();
  const todayStr = now.toISOString().split("T")[0];

  if (dateStr !== todayStr) return false;

  return now.getHours() >= 7;
}

async function loadDashboard() {

  const user = (await supabase.auth.getUser()).data.user;

  const days = getNextWorkdays(10);

  const { data: orders } = await supabase
    .from("orders")
    .select("*")
    .eq("user_id", user.id);

  const container = document.getElementById("weekContainer");
  container.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDate(day);
    const myOrder = orders.find(o => o.order_date === dateStr);

    container.innerHTML += `
      <div class="card">
        <h3>${getDayName(day)} - ${dateStr}</h3>
        <p>${myOrder ? "Dein Menü: "+myOrder.selected_menu : "Keine Bestellung"}</p>

        <button onclick="order('${dateStr}','Menu 1')">Menü 1</button>
        <button onclick="order('${dateStr}','Menu 2')">Menü 2</button>
        <button onclick="cancel('${dateStr}')">Abmelden</button>
      </div>
    `;
  });
}

async function order(date, menu) {

  if (isTooLate(date)) {
    alert("Zu spät! Bestellung nach 07:00 nicht möglich");
    return;
  }

  const user = (await supabase.auth.getUser()).data.user;

  await supabase.from("orders").upsert({
    user_id: user.id,
    order_date: date,
    selected_menu: menu,
    status: "ordered"
  });

  loadDashboard();
}

async function cancel(date) {

  if (isTooLate(date)) {
    alert("Zu spät zum Abmelden!");
    return;
  }

  const user = (await supabase.auth.getUser()).data.user;

  await supabase
    .from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  loadDashboard();
}

loadDashboard();
loadMenuPDF();

</script>

</body>
</html>
