<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

button {
  background: #14968F;
  color: white;
  border: none;
  padding: 8px;
  margin: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Mittagessen Bestellung</h1>

<div id="weekContainer"></div>

</div>

<script src="supabase.js"></script>

<script>

// 🔥 gleiche Logik wie Admin
function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const day = current.getDay();

    if (day !== 0 && day !== 6) {
      days.push(new Date(current));
    }

    current.setDate(current.getDate() + 1);
  }

  return days;
}

function formatDate(date) {
  return date.toISOString().split("T")[0];
}

function getDayName(date) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][date.getDay()];
}

async function loadDashboard() {

  const user = (await window.supabaseClient.auth.getUser()).data.user;

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const days = getNextWorkdays(10);

  const { data: orders } = await window.supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id);

  const container = document.getElementById("weekContainer");
  container.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDate(day);

    const myOrder = orders.find(o => o.order_date === dateStr);

    container.innerHTML += `
      <div class="card">
        <h3>${getDayName(day)} - ${dateStr}</h3>
        <p>Deine Bestellung: ${myOrder ? myOrder.selected_menu : "Keine"}</p>

        <button onclick="order('${dateStr}', 'Menu 1')">Menü 1</button>
        <button onclick="order('${dateStr}', 'Menu 2')">Menü 2</button>
        <button onclick="cancel('${dateStr}')">Abmelden</button>
      </div>
    `;
  });
}

async function order(date, menu) {

  const user = (await window.supabaseClient.auth.getUser()).data.user;

  await window.supabaseClient
    .from("orders")
    .upsert({
      user_id: user.id,
      order_date: date,
      selected_menu: menu,
      status: "ordered"
    });

  loadDashboard();
}

async function cancel(date) {

  const user = (await window.supabaseClient.auth.getUser()).data.user;

  await window.supabaseClient
    .from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  loadDashboard();
}

loadDashboard();

</script>

</body>
</html>
