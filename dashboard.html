<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 900px;
  margin: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: center;
}

th {
  background: #14968F;
  color: white;
}

button {
  padding: 5px;
  margin: 2px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 5px;
}

.selected {
  background: #2ecc71 !important;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="card">

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
<button onclick="logout()">Logout</button>
</div>

<h2>3 Wochen Übersicht</h2>

<h3>Menü Datei</h3>
<div id="menuFile"></div>

<table id="table"></table>

</div>

<script src="supabase.js"></script>

<script>
let user;

async function checkUser() {
  const res = await window.supabaseClient.auth.getUser();

  if (!res.data.user) {
    window.location.href = "login.html";
  } else {
    user = res.data.user;
    loadTable();
  }
}

const file = localStorage.getItem("menu_file");
if (file) {
  menuFile.innerHTML = `<a href="${file}" target="_blank">Menü öffnen</a>`;
}

function getDays() {
  let days = [];

  for (let i = 0; i < 21; i++) {
    let d = new Date();
    d.setDate(new Date().getDate() + i);

    if (d.getDay() !== 0 && d.getDay() !== 6) {
      days.push({
        date: d.toISOString().split("T")[0],
        label: d.toLocaleDateString("de-CH")
      });
    }
  }

  return days;
}

async function loadTable() {
  const days = getDays();

  let html = `<tr>
<th>Datum</th><th>Menü 1</th><th>Menü 2</th><th>Aktion</th></tr>`;

  for (let day of days) {

    const menu = await window.supabaseClient
      .from("weekly_menu")
      .select("*")
      .eq("menu_date", day.date)
      .single();

    const order = await window.supabaseClient
      .from("orders")
      .select("*")
      .eq("user_id", user.id)
      .eq("order_date", day.date)
      .single();

    html += `<tr>
<td>${day.label}</td>

<td>${menu.data ? menu.data.menu_1 : "-"}<br>
<button onclick="orderMeal('${day.date}','Menu 1')" ${order.data?.selected_menu==="Menu 1"?"class='selected'":""}>Wählen</button>
</td>

<td>${menu.data ? menu.data.menu_2 : "-"}<br>
<button onclick="orderMeal('${day.date}','Menu 2')" ${order.data?.selected_menu==="Menu 2"?"class='selected'":""}>Wählen</button>
</td>

<td><button onclick="cancel('${day.date}')">Abmelden</button></td>
</tr>`;
  }

  table.innerHTML = html;
}

async function orderMeal(date, menu) {
  await window.supabaseClient.from("orders").upsert({
    user_id: user.id,
    order_date: date,
    selected_menu: menu
  });

  loadTable();
}

async function cancel(date) {
  await window.supabaseClient.from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  loadTable();
}

async function logout() {
  await window.supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

checkUser();
</script>

</body>
</html>
