<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  width: 380px;
  text-align: center;
}

.day {
  border: 1px solid #ddd;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 6px;
}

.selected {
  background: #2ecc71 !important;
}
</style>
</head>

<body>

<div class="card">

<h2>Deine Woche</h2>
<button onclick="logout()">Logout</button>

<div id="week"></div>

</div>

<script src="supabase.js"></script>

<script>

let user = null;

async function checkUser() {
  const res = await window.supabaseClient.auth.getUser();

  if (!res.data.user) {
    window.location.href = "login.html";
  } else {
    user = res.data.user;
    loadWeek();
  }
}

function getWeekDates() {
  const today = new Date();
  const monday = new Date(today);
  monday.setDate(today.getDate() - today.getDay() + 1);

  let days = [];

  for (let i = 0; i < 5; i++) {
    let d = new Date(monday);
    d.setDate(monday.getDate() + i);

    days.push({
      date: d.toISOString().split("T")[0],
      label: d.toLocaleDateString("de-CH", { weekday: 'long', day: '2-digit', month: '2-digit' })
    });
  }

  return days;
}

async function loadWeek() {
  const days = getWeekDates();

  let html = "";

  for (let day of days) {

    const menu = await window.supabaseClient
      .from("weekly_menu")
      .select("*")
      .eq("menu_date", day.date)
      .single();

    const order = await window.supabaseClient
      .from("orders")
      .select("*")
      .eq("user_id", user.id)
      .eq("order_date", day.date)
      .single();

    html += `
      <div class="day">
        <b>${day.label}</b><br><br>

        ${menu.data ? menu.data.menu_1 : "-"}<br>
        ${menu.data ? menu.data.menu_2 : "-"}<br><br>

        <button onclick="orderMeal('${day.date}','Menu 1')"
        ${order.data?.selected_menu === "Menu 1" ? "class='selected'" : ""}>
        Menü 1
        </button>

        <button onclick="orderMeal('${day.date}','Menu 2')"
        ${order.data?.selected_menu === "Menu 2" ? "class='selected'" : ""}>
        Menü 2
        </button>

        <button onclick="cancel('${day.date}')">Abmelden</button>
      </div>
    `;
  }

  document.getElementById("week").innerHTML = html;
}

async function orderMeal(date, menu) {

  await window.supabaseClient
    .from("orders")
    .upsert({
      user_id: user.id,
      order_date: date,
      selected_menu: menu,
      status: "ordered"
    });

  loadWeek();
}

async function cancel(date) {
  await window.supabaseClient
    .from("orders")
    .delete()
    .eq("user_id", user.id)
    .eq("order_date", date);

  loadWeek();
}

async function logout() {
  await window.supabaseClient.auth.signOut();
  window.location.href = "login.html";
}

checkUser();

</script>

</body>
</html>
