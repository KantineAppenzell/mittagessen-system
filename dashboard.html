<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #14968F;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

iframe {
  width: 100%;
  height: 400px;
  border: none;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #14968F;
  color: white;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

input[type="checkbox"] {
  transform: scale(1.3);
  cursor: pointer;
}

.topbar {
  position: absolute;
  top: 10px;
  left: 10px;
}

.topbar button {
  background: white;
  border: none;
  padding: 8px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="history.back()">⬅ Zurück</button>
</div>

<div class="container">

<h1>Mittagessen Bestellung</h1>

<!-- PDF -->
<div class="card">
<h2>Menü (max. 2 PDFs)</h2>
<div id="menuContainer">Lade Menü...</div>
</div>

<!-- TABELLE -->
<div class="card">
<h2>2 Wochen Auswahl</h2>

<table>
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody id="menuTable"></tbody>
</table>

</div>

</div>

<script>

// ---------- HELPERS ----------
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

function isTooLate(dateStr) {
  const now = new Date();
  const todayStr = formatDateLocal(now);
  return dateStr === todayStr && now.getHours() >= 7;
}

// ---------- PDF LADEN ----------
async function loadMenuPDF(){

  const { data } = await supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending:false })
    .limit(2);

  const container = document.getElementById("menuContainer");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = "Kein Menü verfügbar";
    return;
  }

  data.forEach(pdf => {
    container.innerHTML += `<iframe src="${pdf.file_url}"></iframe>`;
  });
}

// ---------- DASHBOARD ----------
async function loadDashboard() {

  const user = (await supabaseClient.auth.getUser()).data.user;

  if (!user) {
    alert("Nicht eingeloggt!");
    window.location.href = "login.html";
    return;
  }

  const { data: orders } = await supabaseClient
    .from("orders")
    .select("*")
    .eq("user_id", user.id);

  const days = getNextWorkdays(10);
  const table = document.getElementById("menuTable");
  table.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const myOrder = orders.find(o => o.order_date === dateStr);

    const m1Checked = myOrder?.selected_menu === "Menu 1" ? "checked" : "";
    const m2Checked = myOrder?.selected_menu === "Menu 2" ? "checked" : "";

    const disabled = isTooLate(dateStr) ? "disabled" : "";

    table.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>

        <td>
          <input type="checkbox"
            ${m1Checked}
            ${disabled}
            onchange="selectMenu('${dateStr}','Menu 1')">
        </td>

        <td>
          <input type="checkbox"
            ${m2Checked}
            ${disabled}
            onchange="selectMenu('${dateStr}','Menu 2')">
        </td>
      </tr>
    `;
  });
}

// ---------- MENU AUSWAHL ----------
async function selectMenu(date, menu){

  if (isTooLate(date)) {
    alert("Zu spät!");
    return;
  }

  const user = (await supabaseClient.auth.getUser()).data.user;

  await supabaseClient.from("orders").upsert({
    user_id: user.id,
    order_date: date,
    selected_menu: menu,
    status: "ordered"
  });

  loadDashboard();
}

// ---------- START ----------
window.onload = () => {
  loadDashboard();
  loadMenuPDF();
};

</script>

</body>
</html>
