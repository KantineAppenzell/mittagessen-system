<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 12px;
  text-align: center;
  width: 320px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #14968F;
  color: white;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="card">
<h2>Mittagessen wählen</h2>

<div id="menu">Lade Menü...</div>

<button onclick="order('Menu 1')">Menü 1</button>
<button onclick="order('Menu 2')">Menü 2</button>
<button onclick="cancel()">Abmelden</button>

<div id="status"></div>
</div>

<script src="supabase.js"></script>

<script>
async function loadMenu() {
  const today = new Date().toISOString().split("T")[0];

  const { data } = await window.supabaseClient
    .from("weekly_menu")
    .select("*")
    .eq("menu_date", today)
    .single();

  if (data) {
    document.getElementById("menu").innerHTML =
      data.menu_1 + "<br>" + data.menu_2;
  }
}

async function order(menu) {
  const user = await window.supabaseClient.auth.getUser();

  await window.supabaseClient.from("orders").insert({
    user_id: user.data.user.id,
    order_date: new Date().toISOString().split("T")[0],
    selected_menu: menu,
    status: "ordered"
  });

  document.getElementById("status").innerText = "Bestellt!";
}

async function cancel() {
  const user = await window.supabaseClient.auth.getUser();

  await window.supabaseClient
    .from("orders")
    .update({ status: "cancelled" })
    .eq("user_id", user.data.user.id);

  document.getElementById("status").innerText = "Abgemeldet!";
}

loadMenu();
</script>

</body>
</html>
