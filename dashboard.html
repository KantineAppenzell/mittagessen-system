<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background-color: #14968F;
  color: white;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* 🔥 TABELLE CLEAN */
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th {
  background: #14968F;
  color: white;
  text-align: center;
}

td, th {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  text-align: center;
}

/* gleiche Spaltenbreite */
th:nth-child(1), td:nth-child(1) { width: 15%; }
th:nth-child(2), td:nth-child(2) { width: 35%; }
th:nth-child(3), td:nth-child(3) { width: 25%; }
th:nth-child(4), td:nth-child(4) { width: 25%; }

tr:hover {
  background-color: #f5f5f5;
}

/* Buttons */
button {
  background: #14968F;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
  margin-top: 10px;
  border-radius: 6px;
}

.file-item {
  border-bottom: 1px solid #ddd;
  padding: 10px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>

<!-- PDF UPLOAD -->
<div class="card">
<h2>Menü PDF Upload</h2>
<input type="file" id="fileInput">
<button onclick="uploadPDF()">Upload</button>
</div>

<!-- PDF LISTE -->
<div class="card">
<h2>PDF Verwaltung</h2>
<div id="pdfList">Lade...</div>
</div>

<!-- EXPORT -->
<div class="card">
<h2>Export</h2>
<button onclick="exportWeek()">PDF Wochenübersicht</button>
</div>

<!-- ÜBERSICHT -->
<div class="card">
<h2>2 Wochen Übersicht</h2>

<table id="summaryTable">
<thead>
<tr>
<th>Tag</th>
<th>Datum</th>
<th>Menü 1</th>
<th>Menü 2</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>

// ---------- 🔥 TEXT CLEAN (VERBESSERT) ----------
function cleanText(text) {
  if (!text) return "";

  return text
    .replace(/&[a-z]+;/gi, "")          // HTML Entities entfernen (&amp;)
    .replace(/&/g, "")                  // einzelne &
    .replace(/[^\p{L}\s]/gu, "")        // nur Buchstaben (inkl. äöü)
    .replace(/\s+/g, " ")
    .trim();
}

// ---------- HELPERS ----------
function formatDateLocal(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getNextWorkdays(count) {
  const days = [];
  let current = new Date();

  while (days.length < count) {
    const d = current.getDay();
    if (d !== 0 && d !== 6) days.push(new Date(current));
    current.setDate(current.getDate() + 1);
  }

  return days;
}

function getDayName(d) {
  return ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()];
}

// ---------- PDF UPLOAD ----------
async function uploadPDF(){

  const file = document.getElementById("fileInput").files[0];

  if(!file){
    alert("Bitte Datei wählen");
    return;
  }

  const fileName = Date.now() + "_" + file.name;

  const { error } = await supabaseClient
    .storage
    .from("menus")
    .upload(fileName, file);

  if(error){
    alert("Upload Fehler: " + error.message);
    return;
  }

  const { data } = supabaseClient
    .storage
    .from("menus")
    .getPublicUrl(fileName);

  await supabaseClient
    .from("menu_files")
    .insert({
      file_url: data.publicUrl
    });

  alert("Upload erfolgreich!");
  loadPDFList();
}

// ---------- PDF LISTE ----------
async function loadPDFList(){

  const { data } = await supabaseClient
    .from("menu_files")
    .select("*")
    .order("created_at", { ascending:false });

  const container = document.getElementById("pdfList");
  container.innerHTML = "";

  if(!data || data.length === 0){
    container.innerHTML = "Keine PDFs vorhanden";
    return;
  }

  data.forEach(pdf => {
    container.innerHTML += `
      <div class="file-item">
        ${pdf.file_url}
        <br>
        <button onclick="deletePDF('${pdf.file_url}')">Löschen</button>
      </div>
    `;
  });
}

// ---------- DELETE ----------
async function deletePDF(fileUrl){

  if(!confirm("Wirklich löschen?")) return;

  const path = fileUrl.split("/menus/")[1];

  await supabaseClient.storage.from("menus").remove([path]);

  await supabaseClient
    .from("menu_files")
    .delete()
    .eq("file_url", fileUrl);

  alert("Gelöscht!");
  loadPDFList();
}

// ---------- DASHBOARD ----------
async function loadAdminData() {

  const { data: orders } = await supabaseClient
    .from("orders")
    .select("*");

  const days = getNextWorkdays(10);

  const tbody = document.querySelector("#summaryTable tbody");
  tbody.innerHTML = "";

  days.forEach(day => {

    const dateStr = formatDateLocal(day);

    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    tbody.innerHTML += `
      <tr>
        <td>${getDayName(day)}</td>
        <td>${dateStr}</td>
        <td><strong>${m1}</strong></td>
        <td><strong>${m2}</strong></td>
      </tr>
    `;
  });
}

// ---------- PDF EXPORT ----------
async function exportWeek() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const { data: orders } = await supabaseClient.from("orders").select("*");
  const { data: profiles } = await supabaseClient.from("profiles").select("*");

  const days = getNextWorkdays(10);

  let y = 10;

  doc.setFontSize(14);
  doc.text("Wochenübersicht", 10, y);

  doc.setFontSize(10);

  // Übersicht
  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    const m1 = dayOrders.filter(o => o.selected_menu === "Menu 1").length;
    const m2 = dayOrders.filter(o => o.selected_menu === "Menu 2").length;

    y += 8;
    doc.text(`${getDayName(day)} ${dateStr} | M1: ${m1} | M2: ${m2}`, 10, y);
  });

  y += 12;
  doc.setFontSize(12);
  doc.text("Details", 10, y);

  doc.setFontSize(10);

  // Details CLEAN
  days.forEach(day => {

    const dateStr = formatDateLocal(day);
    const dayOrders = orders.filter(o => o.order_date === dateStr);

    y += 8;
    doc.text(`${getDayName(day)} ${dateStr}`, 10, y);

    if(dayOrders.length === 0){
      y += 5;
      doc.text("Keine Bestellungen", 10, y);
      return;
    }

    dayOrders.forEach(o => {

      const user = profiles.find(p => p.id === o.user_id);
      const rawName = user ? user.full_name : "Unbekannt";

      const name = cleanText(rawName); // 🔥 FIX

      y += 5;
      doc.text(`- ${name} -> ${o.selected_menu}`, 10, y);
    });

  });

  doc.save("wochenreport.pdf");
}

// ---------- START ----------
loadAdminData();
loadPDFList();

</script>

</body>
</html>
